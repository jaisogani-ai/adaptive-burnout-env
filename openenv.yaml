name: "Adaptive AI Productivity Engine"
version: "2.0.0"
author: "jai"
description: "A continuous productivity simulation environment designed to model human state dynamics (Energy, Stress, Motivation) balancing long-term progress metrics."
entrypoint: "environment:ProductivityEnv"

capabilities:
  deterministic: true
  action_space: "discrete"
  observation_space: "pydantic"
  reward_space: "pydantic"

action_space:
  type: int
  min: 0
  max: 4

observation_space:
  type: object
  structure:
    energy: float
    stress: float
    motivation: float
    progress: float

reward_space:
  type: float
  min: 0.0
  max: 1.0

tasks:
  - id: "easy"
    description: "Basic progression."
    evaluation: "grader.py:grade_easy"
    deterministic: true
  
  - id: "medium"
    description: "Progress and stress balance."
    evaluation: "grader.py:grade_medium"
    deterministic: true

  - id: "hard"
    description: "Optimal productivity."
    evaluation: "grader.py:grade_hard"
    deterministic: true
